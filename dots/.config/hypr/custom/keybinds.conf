# bind = Super, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh  "${TERMINAL}" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden] (terminal) (alt)
# bind = Ctrl+Alt, T, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "${TERMINAL}" "kitty -1" "foot" "alacritty" "wezterm" "konsole" "kgx" "uxterm" "xterm" # [hidden] (terminal) (for Ubuntu people)
# bind = Super, E, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "dolphin" "nautilus" "nemo" "thunar" "${TERMINAL}" "kitty -1 fish -c yazi" # File manager
unbind = Super, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "google-chrome-stable" "zen-browser" "firefox" "brave" "chromium" "microsoft-edge-stable" "opera" "librewolf"
bind = Super, W, exec, firefox # Browser
# bind = Super, C, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "code" "codium" "cursor" "zed" "zedit" "zeditor" "kate" "gnome-text-editor" "emacs" "command -v nvim && kitty -1 nvim" "command -v micro && kitty -1 micro" # Code editor
# bind = Ctrl+Super+Shift+Alt, W, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "wps" "onlyoffice-desktopeditors" "libreoffice" # Office software
# bind = Super, X, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "kate" "gnome-text-editor" "emacs" # Text editor
# bind = Ctrl+Super, V, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "pavucontrol-qt" "pavucontrol" # Volume mixer
# bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome ~/.config/hypr/hyprland/scripts/launch_first_available.sh "qs -p ~/.config/quickshell/$qsConfig/settings.qml" "systemsettings" "gnome-control-center" "better-control" # Settings app
# bind = Ctrl+Shift, Escape, exec, ~/.config/hypr/hyprland/scripts/launch_first_available.sh "gnome-system-monitor" "plasma-systemmonitor --page-name Processes" "command -v btop && kitty -1 fish -c btop" # Task manager

# Mekki's Scripts
# all float on
bind = SUPER, F11, exec, ~/.config/hypr/custom/scripts/toggle-float.sh
# exempt focused window from forced float size
bind = SUPER, F12, exec, ~/.config/hypr/custom/scripts/exempt-float-size.py
# old tearing toggle (replaced by quickshell button)
bind = WIN, F1, exec, ~/.config/hypr/gamemode.sh
# old direct scanout toggle (replaced by quickshell button)
bind = WIN, F2, exec, ~/.config/hypr/do.sh

# Dusky Rofi Animation Switcher
bind = Super+Alt, A, exec, pkill rofi; rofi -show animations -modi "animations:~/.config/hypr/custom/scripts/hypr_anim.sh"

# Dusky Hyprexpo
# bind = Alt, Tab, hyprexpo:expo, toggle # commented out by default


# Dusky Native Hyprland Aesthetic Toggles
# Per-window opacity toggle (setprop)
bind = Super, period, setprop, activewindow opaque toggle
# Per-window blur toggle (setprop)
bind = Super, comma, setprop, activewindow no_blur toggle

# === Dusky Screen Magnifier (Zoom) ===
binde = Super, equal, exec, sh -c "hyprctl keyword cursor:zoom_factor \"$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {print $2 * 1.25}')\""
binde = Super, minus, exec, sh -c "hyprctl keyword cursor:zoom_factor \"$(hyprctl getoption cursor:zoom_factor | awk 'NR==1 {val = $2 / 1.25; if (val < 1.0) val = 1.0; print val}')\""
bind = Super, BACKSPACE, exec, hyprctl keyword cursor:zoom_factor 1.0

# Cycle to the next window and bring it to the front
bind = Alt, Tab, cyclenext,
bind = Alt, Tab, bringactivetotop,

# Cycle backwards (Alt+Shift+Tab)
bind = Alt Shift, Tab, cyclenext, prev
bind = Alt Shift, Tab, bringactivetotop,

# Toggle strictly between the current window and the last used window
bind = Alt, Q, focuscurrentorlast
bind = Alt, Q, bringactivetotop

##! Floating window management
# Move floating window with keyboard (hold to repeat)
binde = Super+Ctrl, Left, moveactive, -30 0
binde = Super+Ctrl, Right, moveactive, 30 0
binde = Super+Ctrl, Up, moveactive, 0 -30
binde = Super+Ctrl, Down, moveactive, 0 30
# Resize floating window with keyboard (hold to repeat)
binde = Super+Alt, Right, resizeactive, 30 0
binde = Super+Alt, Left, resizeactive, -30 0
binde = Super+Alt, Down, resizeactive, 0 30
binde = Super+Alt, Up, resizeactive, 0 -30
# Center floating window on screen
bind = Super+Alt, C, centerwindow
# Raise/lower window z-order
bind = Super, Z, alterzorder, top
bind = Super+Shift, Z, alterzorder, bottom
