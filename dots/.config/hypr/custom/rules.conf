# Disable blur for all xwayland apps
windowrule = match:class ^()$, match:title ^()$, no_blur on

# osu
windowrule = match:class ^(osu\!)$, immediate on
windowrule = match:class ^(osu\!)$, no_blur on
windowrule = match:class ^(osu\!)$, no_shadow on
windowrule = match:class ^(osu\!)$, no_anim on
windowrule = match:class ^(osu!.exe)$, immediate on

windowrule = match:class ^(osu!)$, float on
windowrule = match:class ^(osu!)$, size 1300 1000
windowrule = match:class ^(osu!)$, center on

# windowrule = match:class ^(osu!)$, stay_focused on
# windowrule = match:class ^(osu!)$, suppress_event activate activatefocus

# Waydroid: multi-window mode — always float, strip all effects
windowrule = match:class ^([Ww]aydroid.*)$, float on
windowrule = match:class ^([Ww]aydroid.*)$, center on
windowrule = match:class ^([Ww]aydroid.*)$, no_blur on
windowrule = match:class ^([Ww]aydroid.*)$, no_shadow on
windowrule = match:class ^([Ww]aydroid.*)$, no_anim on
windowrule = match:class ^([Ww]aydroid.*)$, rounding 0

# osu!stable
windowrule = match:class ^(osu!.exe)$, immediate on

# chrome
windowrule = match:class ^(google-chrome-unstable)$, immediate on
windowrule = match:class ^(chromium)$, immediate on

# scrcpy
windowrule = match:class ^(scrcpy)$, float on
windowrule = match:class ^(scrcpy)$, size 416 896
windowrule = match:class ^(scrcpy)$, center on

# task manager
windowrule = match:class ^(org.kde.plasma-systemmonitor)$, float on
windowrule = match:class ^(org.kde.plasma-systemmonitor)$, size 1304 776
windowrule = match:class ^(org.kde.plasma-systemmonitor)$, center on

# mouse solaar
windowrule = match:class ^(solaar)$, float on
windowrule = match:class ^(solaar)$, size 951 569
windowrule = match:class ^(solaar)$, center on

# Windscribe
windowrule = match:class ^(Windscribe)$, float on
windowrule = match:class ^(Windscribe)$, center on
windowrule = match:class ^(Windscribe)$, no_anim on

# EasyEffects
# windowrule = match:class ^(com\.github\.wwmm\.easyeffects)$, float on
# windowrule = opacity 0.89 override 0.89 override, match:class .*

# all float on
windowrule {
    name = master_float
    match:class = .*

    float = on
}

# Default float size (excludes apps that should pick their own size)
windowrule {
    name = master_float_size
    match:class = negative:^([Ww]aydroid.*|jetbrains-.*|jetbrains-studio|winboat-Microsoft Edge|winboat|osu!|org\.kde\.dolphin|osu!\.exe)$

    size = 1200 800
}
